apiVersion: v1
kind: Service
metadata:
  name: {{ include "pve-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pve-exporter.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "pve-exporter.selectorLabels" . | nindent 4 }}
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
