{{- if and .Values.mysql.enabled (not .Values.mysql.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ghost.mysqlSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghost.labels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
type: Opaque
stringData:
  {{ .Values.mysql.auth.passwordKey }}: {{ required "mysql.auth.password or mysql.auth.existingSecret is required" .Values.mysql.auth.password | quote }}
  {{- if .Values.mysql.auth.rootPassword }}
  {{ .Values.mysql.auth.rootPasswordKey }}: {{ .Values.mysql.auth.rootPassword | quote }}
  {{- end }}
{{- end }}
