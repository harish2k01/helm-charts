{{- if .Values.qbittorrent.auth.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qbittorrent-exporter.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qbittorrent-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.qbittorrent.auth.method "legacy" }}
  {{ .Values.qbittorrent.auth.usernameSecretKey }}: {{ required "qbittorrent.auth.username is required when createSecret=true and auth.method=legacy" .Values.qbittorrent.auth.username | quote }}
  {{ .Values.qbittorrent.auth.passwordSecretKey }}: {{ required "qbittorrent.auth.password is required when createSecret=true and auth.method=legacy" .Values.qbittorrent.auth.password | quote }}
  {{- else if eq .Values.qbittorrent.auth.method "apiKey" }}
  {{ .Values.qbittorrent.auth.apiKeySecretKey }}: {{ required "qbittorrent.auth.apiKey is required when createSecret=true and auth.method=apiKey" .Values.qbittorrent.auth.apiKey | quote }}
  {{- end }}
{{- end }}
