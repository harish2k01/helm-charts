{{- if and .Values.token.create (not .Values.token.sealedSecret.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudflared.tokenSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudflared.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.token.secretKey }}: {{ required "token.value is required when token.create=true" .Values.token.value | quote }}
{{- end }}
