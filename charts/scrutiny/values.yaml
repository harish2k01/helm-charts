image:
  repository: ghcr.io/analogj/scrutiny
  tag: v0.9.2-web
  pullPolicy: IfNotPresent

service:
  port: 8080

scrutiny:
  truenas:
    host: 192.168.1.10
    user: truenas_admin
    port: 22

ssh:
  existingSecret: scrutiny-ssh-key

ingress:
  enabled: false
  className: traefik
  host: scrutiny.local

httpRoute:
  enabled: false
  parentRefs:
    - name: traefik
      namespace: kube-system
  hostnames:
    - scrutiny.local

resources: {}

probes:
  enabled: true