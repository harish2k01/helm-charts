apiVersion: v1
kind: Service
metadata:
  name: {{ include "scrutiny.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scrutiny.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "scrutiny.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
