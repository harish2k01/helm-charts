apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scrutiny.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scrutiny.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "scrutiny.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scrutiny.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: seed-config
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              if [ ! -f /opt/scrutiny/config/scrutiny.yaml ]; then
                cp /config-template/scrutiny.yaml /opt/scrutiny/config/scrutiny.yaml
              fi
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: scrutiny-config
              mountPath: /opt/scrutiny/config
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: scrutiny-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: scrutiny-config
              mountPath: /opt/scrutiny/config
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false

        - name: influxdb
          image: "{{ .Values.influxdb.image.repository }}:{{ .Values.influxdb.image.tag }}"
          imagePullPolicy: {{ .Values.influxdb.image.pullPolicy }}
          ports:
            - name: influxdb
              containerPort: 8086
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
          resources:
            {{- toYaml .Values.influxdb.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false

      volumes:
        - name: config-template
          configMap:
            name: {{ include "scrutiny.fullname" . }}-config
        - name: scrutiny-config
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "scrutiny.fullname" . }}-scrutiny
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: influxdb-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "scrutiny.fullname" . }}-influxdb
          {{- else }}
          emptyDir: {}
          {{- end }}
