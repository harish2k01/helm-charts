apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scrutiny.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scrutiny.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "scrutiny.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "scrutiny.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: scrutiny
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080

          env:
            - name: SSH_SKIP_HOST_KEY_CHECK
              value: "true"

          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- end }}

          volumeMounts:
            - name: config
              mountPath: /opt/scrutiny/config
            - name: ssh-key
              mountPath: /opt/scrutiny/ssh
              readOnly: true

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

      volumes:
        - name: config
          configMap:
            name: {{ include "scrutiny.fullname" . }}-config

        - name: ssh-key
          secret:
            secretName: {{ .Values.ssh.existingSecret }}