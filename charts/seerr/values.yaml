replicaCount: 1

# Container image. The default tag is pinned instead of using latest so chart
# installs are repeatable.
image:
  repository: ghcr.io/seerr-team/seerr
  tag: "v3.2.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

# Non-secret application environment variables.
env:
  TZ: Asia/Kolkata
  PORT: "5055"

# Main HTTP service for the Seerr web UI/API.
service:
  type: ClusterIP
  port: 5055
  targetPort: 5055
  portName: http
  extraPorts: []

extraContainerPorts: []

# Persistent application configuration. Seerr stores its app data under
# /app/config.
persistence:
  config:
    enabled: true
    mountPath: /app/config
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: ""

# Generic media mount support. Seerr usually talks to Jellyfin/*arr services
# over HTTP and does not need direct media storage.
media:
  enabled: false
  existingClaim: ""
  mountPath: /vault
  readOnly: false
  mounts: []

# Seerr usually does not need host devices, but the generic chart supports them
# for advanced use cases.
hostDevices:
  enabled: false
  devices: []

# Advanced volume hooks for custom mounts that are not covered above.
extraVolumes: []
extraVolumeMounts: []

# Optional Kubernetes Ingress for exposing the web UI/API.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Optional Gateway API HTTPRoute for exposing the web UI/API.
httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources: {}

livenessProbe:
  httpGet:
    path: /api/v1/settings/public
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/settings/public
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
