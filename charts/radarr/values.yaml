replicaCount: 1

# Container image. The default tag is pinned instead of using latest so chart
# installs are repeatable.
image:
  repository: lscr.io/linuxserver/radarr
  tag: "6.1.1"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

# LinuxServer.io images use PUID/PGID to choose the user that owns app files.
# Match these to the permissions on your config and media volumes.
env:
  PUID: "3000"
  PGID: "3000"
  TZ: Asia/Kolkata

# Main HTTP service for the Radarr web UI/API.
service:
  type: ClusterIP
  port: 7878
  targetPort: 7878
  portName: http
  extraPorts: []

extraContainerPorts: []

# Persistent application configuration. This should be separate from media
# storage because Radarr writes its database and settings here.
persistence:
  config:
    enabled: true
    mountPath: /config
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: ""

# Optional existing media PVC. To preserve hardlinks and atomic moves, mount the
# same PVC at the same path as qBittorrent and the other media automation apps.
media:
  enabled: false
  existingClaim: ""
  mountPath: /vault
  readOnly: false
  mounts: []

# Radarr usually does not need host devices, but the generic chart supports them
# for advanced use cases.
hostDevices:
  enabled: false
  devices: []

# Advanced volume hooks for custom mounts that are not covered above.
extraVolumes: []
extraVolumeMounts: []

# Optional Kubernetes Ingress for exposing the web UI/API.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Optional Gateway API HTTPRoute for exposing the web UI/API.
httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 45
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
