apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "owncloud.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "owncloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: owncloud
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.deployment.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "owncloud.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: owncloud
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "owncloud.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: owncloud
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "owncloud.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.deployment.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.schedulerName }}
      schedulerName: {{ . | quote }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.mariadb.enabled .Values.redis.enabled .Values.extraInitContainers }}
      initContainers:
        {{- if .Values.mariadb.enabled }}
        - name: wait-for-mariadb
          image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - until MYSQL_PWD="$OWNCLOUD_DB_PASSWORD" mysqladmin ping -h "$OWNCLOUD_DB_HOST" -u "$OWNCLOUD_DB_USERNAME"; do sleep 2; done
          env:
            - name: OWNCLOUD_DB_HOST
              value: {{ include "owncloud.databaseHost" . | quote }}
            - name: OWNCLOUD_DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: OWNCLOUD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "owncloud.databaseSecretName" . }}
                  key: {{ .Values.database.passwordKey }}
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: wait-for-redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - until redis-cli -h "$OWNCLOUD_REDIS_HOST" -p "$OWNCLOUD_REDIS_PORT" ping | grep -q PONG; do sleep 2; done
          env:
            - name: OWNCLOUD_REDIS_HOST
              value: {{ include "owncloud.redisHost" . | quote }}
            - name: OWNCLOUD_REDIS_PORT
              value: {{ .Values.redis.service.port | quote }}
        {{- end }}
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: owncloud
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            {{- toYaml .Values.containerPorts | nindent 12 }}
          env:
            - name: OWNCLOUD_DOMAIN
              value: {{ .Values.owncloud.domain | quote }}
            - name: OWNCLOUD_TRUSTED_DOMAINS
              value: {{ include "owncloud.trustedDomains" . | quote }}
            - name: OWNCLOUD_DB_TYPE
              value: {{ .Values.database.type | quote }}
            - name: OWNCLOUD_DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: OWNCLOUD_DB_USERNAME
              value: {{ .Values.database.username | quote }}
            - name: OWNCLOUD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "owncloud.databaseSecretName" . }}
                  key: {{ .Values.database.passwordKey }}
            - name: OWNCLOUD_DB_HOST
              value: {{ include "owncloud.databaseHost" . | quote }}
            - name: OWNCLOUD_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "owncloud.adminSecretName" . }}
                  key: {{ .Values.owncloud.admin.usernameKey }}
            - name: OWNCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "owncloud.adminSecretName" . }}
                  key: {{ .Values.owncloud.admin.passwordKey }}
            - name: OWNCLOUD_MYSQL_UTF8MB4
              value: {{ ternary "true" "false" .Values.owncloud.mysqlUtf8mb4 | quote }}
            {{- if .Values.redis.enabled }}
            - name: OWNCLOUD_REDIS_ENABLED
              value: "true"
            - name: OWNCLOUD_REDIS_HOST
              value: {{ include "owncloud.redisHost" . | quote }}
            {{- end }}
            {{- range $name, $value := .Values.env }}
            {{- if ne (toString $value) "" }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.secretEnv.create }}
            {{- range $name, $value := .Values.secretEnv.values }}
            {{- if ne (toString $value) "" }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "owncloud.secretEnvName" $ }}
                  key: {{ $name }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range .Values.secretEnv.existingSecret.keys }}
            - name: {{ .envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "owncloud.secretEnvName" $ }}
                  key: {{ .secretKey }}
                  optional: {{ default false .optional }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.persistence.data.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.data.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.persistence.data.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ default (include "owncloud.fullname" .) .Values.persistence.data.existingClaim }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
