{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "owncloud.databaseSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "owncloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  {{ .Values.database.passwordKey }}: {{ required "database.password or database.existingSecret is required" .Values.database.password | quote }}
  {{- if and .Values.mariadb.enabled .Values.mariadb.auth.rootPassword }}
  {{ .Values.mariadb.auth.rootPasswordKey }}: {{ .Values.mariadb.auth.rootPassword | quote }}
  {{- end }}
{{- end }}
