{{- if not .Values.owncloud.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "owncloud.adminSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "owncloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: owncloud
type: Opaque
stringData:
  {{ .Values.owncloud.admin.usernameKey }}: {{ required "owncloud.admin.username or owncloud.admin.existingSecret is required" .Values.owncloud.admin.username | quote }}
  {{ .Values.owncloud.admin.passwordKey }}: {{ required "owncloud.admin.password or owncloud.admin.existingSecret is required" .Values.owncloud.admin.password | quote }}
{{- end }}
