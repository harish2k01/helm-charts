replicaCount: 1

# Official ownCloud Server image. Pin the tag so upgrades are intentional.
image:
  repository: owncloud/server
  tag: "10.16.2"
  pullPolicy: IfNotPresent

# Use imagePullSecrets when pulling from a private registry mirror.
imagePullSecrets: []

# Override generated resource names when integrating with existing naming rules.
nameOverride: ""
fullnameOverride: ""

# Extra pod metadata for backup, reload, policy, or observability controllers.
podAnnotations: {}
podLabels: {}

# ServiceAccount controls for clusters that enforce token mounting or workload
# identity policies. Tokens are not mounted by default because ownCloud does not
# need Kubernetes API access.
serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

# Leave security contexts empty by default because the official image entrypoint
# manages Apache and data directory permissions. Set these when your cluster
# policy requires explicit users, groups, seccomp, or capabilities.
podSecurityContext: {}
securityContext: {}

# Deployment rollout and scheduling controls for the stateful ownCloud pod.
deployment:
  annotations: {}
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  terminationGracePeriodSeconds: 120

priorityClassName: ""
runtimeClassName: ""
schedulerName: ""
topologySpreadConstraints: []

# ownCloud bootstrap settings. Admin credentials are only used during the first
# initialization of a fresh data volume.
owncloud:
  domain: localhost:8080
  trustedDomains:
    - localhost
  mysqlUtf8mb4: true
  admin:
    username: admin
    # Suitable only for local testing. Prefer existingSecret for production.
    password: CHANGE_ME_OWNCLOUD_ADMIN_PASSWORD
    existingSecret: ""
    usernameKey: admin-username
    passwordKey: admin-password

# Database settings consumed by ownCloud. With mariadb.enabled=true, host is
# generated automatically. Set host and disable mariadb for an external DB.
database:
  type: mysql
  name: owncloud
  username: owncloud
  # Suitable only for local testing. Prefer existingSecret for production.
  password: CHANGE_ME_OWNCLOUD_DB_PASSWORD
  host: ""
  existingSecret: ""
  passwordKey: db-password

# Additional non-secret ownCloud environment variables such as OWNCLOUD_LOGLEVEL.
env: {}

# Additional environment sources such as ConfigMaps or Secrets managed elsewhere.
envFrom: []

# Extra environment variables with full Kubernetes EnvVar support, including
# valueFrom references.
extraEnv: []

# Secret environment variables for SMTP credentials or other sensitive ownCloud
# settings not covered by owncloud.admin or database.
secretEnv:
  create: false
  name: ""
  values: {}
  existingSecret:
    name: ""
    keys: []
    # - envName: OWNCLOUD_MAIL_SMTP_PASSWORD
    #   secretKey: smtp-password
    #   optional: false

command: []
args: []

# Additional init containers and sidecars, for example backup agents,
# certificate syncers, or log/metrics exporters.
extraInitContainers: []
sidecars: []

# Container lifecycle hooks.
lifecycle: {}

# Internal MariaDB database matching the upstream Docker Compose deployment.
# Disable this section when using an external MySQL/MariaDB service.
mariadb:
  enabled: true
  image:
    repository: mariadb
    tag: "10.11"
    pullPolicy: IfNotPresent
  service:
    port: 3306
  auth:
    # Leave empty to let MariaDB generate a random root password. If database
    # existingSecret is set and rootPassword is set, that Secret must also
    # contain rootPasswordKey.
    rootPassword: ""
    rootPasswordKey: db-root-password
  args:
    - --max-allowed-packet=128M
    - --innodb-log-file-size=64M
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
  updateStrategy:
    type: RollingUpdate
  podManagementPolicy: OrderedReady
  terminationGracePeriodSeconds: 60
  extraEnv:
    - name: MARIADB_AUTO_UPGRADE
      value: "1"
  extraVolumes: []
  extraVolumeMounts: []
  livenessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - MYSQL_PWD="$MYSQL_PASSWORD" mysqladmin ping -h 127.0.0.1 -u "$MYSQL_USER"
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - MYSQL_PWD="$MYSQL_PASSWORD" mysqladmin ping -h 127.0.0.1 -u "$MYSQL_USER"
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Redis integration used by the official ownCloud Docker stack. Set internal to
# false and provide host when reusing an existing Redis instance.
redis:
  enabled: true
  internal: true
  host: ""
  image:
    repository: redis
    tag: "6"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  args:
    - --databases
    - "1"
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
  updateStrategy:
    type: RollingUpdate
  podManagementPolicy: OrderedReady
  terminationGracePeriodSeconds: 30
  extraEnv: []
  extraVolumes: []
  extraVolumeMounts: []
  livenessProbe:
    exec:
      command:
        - redis-cli
        - ping
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - redis-cli
        - ping
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Main HTTP service for the ownCloud web UI and WebDAV endpoint.
service:
  type: ClusterIP
  annotations: {}
  port: 8080
  targetPort: http
  portName: http
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  externalTrafficPolicy: ""
  extraPorts: []

containerPorts:
  - name: http
    containerPort: 8080
    protocol: TCP

# Persistent ownCloud data. This stores config, apps, files, and state managed
# by the official image under /mnt/data.
persistence:
  data:
    enabled: true
    mountPath: /mnt/data
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 50Gi
    storageClassName: ""

# Advanced volume hooks for custom CA bundles, config overlays, or backups.
extraVolumes: []
extraVolumeMounts: []

# Optional Kubernetes Ingress for exposing ownCloud through an ingress controller.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Optional Gateway API HTTPRoute for exposing ownCloud through a Gateway.
httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources: {}

# Optional PodDisruptionBudget. Enable this when your cluster performs voluntary
# disruptions and your storage/database setup can tolerate the selected policy.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# Optional NetworkPolicy. When enabled, ingress is limited to the ownCloud
# service port and egress is limited to DNS plus chart-managed MariaDB/Redis
# unless extraIngress/extraEgress rules are provided.
networkPolicy:
  enabled: false
  ingressFrom: []
  extraIngress: []
  allowDNS: true
  extraEgress: []

startupProbe:
  exec:
    command:
      - /usr/bin/healthcheck
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 60

livenessProbe:
  exec:
    command:
      - /usr/bin/healthcheck
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  exec:
    command:
      - /usr/bin/healthcheck
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 5

nodeSelector: {}
tolerations: []
affinity: {}
