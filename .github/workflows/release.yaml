name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - charts/**
      - docs/**
      - .github/workflows/release.yaml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build Helm repository
        run: |
          mkdir -p _site
          cp -R docs/. _site/
          touch _site/.nojekyll

          for chart in charts/*; do
            if [ -d "$chart" ]; then
              helm dependency update "$chart"
              helm package "$chart" --destination _site
            fi
          done

          helm repo index _site --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
