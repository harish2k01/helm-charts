name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - charts/**
      - docs/**
      - .github/workflows/release.yaml

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: helm-charts-runner
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install GnuPG
        shell: bash
        run: |
          set -euo pipefail

          if command -v gpg >/dev/null 2>&1; then
            gpg --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y gnupg
          gpg --version

      - name: Import Helm signing key
        shell: bash
        env:
          HELM_GPG_PRIVATE_KEY_B64: ${{ secrets.HELM_GPG_PRIVATE_KEY_B64 }}
          HELM_GPG_KEY_NAME: ${{ secrets.HELM_GPG_KEY_NAME }}
          HELM_GPG_PASSPHRASE: ${{ secrets.HELM_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${HELM_GPG_PRIVATE_KEY_B64}" ]; then
            echo "HELM_GPG_PRIVATE_KEY_B64 secret is required to sign Helm charts." >&2
            exit 1
          fi

          if [ -z "${HELM_GPG_KEY_NAME}" ]; then
            echo "HELM_GPG_KEY_NAME secret is required to sign Helm charts." >&2
            exit 1
          fi

          export GNUPGHOME="${RUNNER_TEMP}/helm-gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          printf '%s' "$HELM_GPG_PRIVATE_KEY_B64" | base64 -d > "${RUNNER_TEMP}/helm-private-key.asc"
          gpg --batch --import "${RUNNER_TEMP}/helm-private-key.asc"

          printf '%s' "${HELM_GPG_PASSPHRASE}" > "${RUNNER_TEMP}/helm-gpg-passphrase"
          chmod 600 "${RUNNER_TEMP}/helm-gpg-passphrase"

          gpg --batch --yes --pinentry-mode loopback \
            --passphrase-file "${RUNNER_TEMP}/helm-gpg-passphrase" \
            --export-secret-keys "$HELM_GPG_KEY_NAME" > "${RUNNER_TEMP}/helm-secring.gpg"
          gpg --batch --yes --export "$HELM_GPG_KEY_NAME" > "${RUNNER_TEMP}/helm-pubring.gpg"
          gpg --batch --yes --armor --export "$HELM_GPG_KEY_NAME" > "${RUNNER_TEMP}/helm-chart-signing-key.asc"

          {
            echo "GNUPGHOME=${GNUPGHOME}"
            echo "HELM_SIGNING_KEY_NAME=${HELM_GPG_KEY_NAME}"
            echo "HELM_SIGNING_KEYRING=${RUNNER_TEMP}/helm-secring.gpg"
            echo "HELM_SIGNING_PUBLIC_KEYRING=${RUNNER_TEMP}/helm-pubring.gpg"
            echo "HELM_SIGNING_PASSPHRASE_FILE=${RUNNER_TEMP}/helm-gpg-passphrase"
            echo "HELM_SIGNING_PUBLIC_KEY=${RUNNER_TEMP}/helm-chart-signing-key.asc"
          } >> "$GITHUB_ENV"

      - name: Build Helm repository
        shell: bash
        run: |
          set -euo pipefail

          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          mkdir -p _site
          cp -R docs/. _site/
          touch _site/.nojekyll
          cp "$HELM_SIGNING_PUBLIC_KEY" _site/chart-signing-key.asc

          if curl -fsSL "$REPO_URL/index.yaml" -o _site/index.yaml; then
            grep -Eo 'https?://[^[:space:]]+\.tgz' _site/index.yaml | sort -u | while read -r package_url; do
              package_name="$(basename "$package_url")"
              if [ ! -f "_site/$package_name" ]; then
                curl -fsSL "$package_url" -o "_site/$package_name"
              fi

              provenance_name="${package_name}.prov"
              if [ ! -f "_site/$provenance_name" ]; then
                if ! curl -fsSL "${package_url}.prov" -o "_site/$provenance_name" 2>/dev/null; then
                  echo "No existing provenance file found for ${package_name}; it will be created if this chart version is still in charts/."
                  rm -f "_site/$provenance_name"
                fi
              fi
            done
          fi

          for chart in charts/*; do
            if [ -d "$chart" ]; then
              helm dependency update "$chart"
              helm package "$chart" \
                --destination _site \
                --sign \
                --key "$HELM_SIGNING_KEY_NAME" \
                --keyring "$HELM_SIGNING_KEYRING" \
                --passphrase-file "$HELM_SIGNING_PASSPHRASE_FILE"
            fi
          done

          if [ -f _site/index.yaml ]; then
            cp _site/index.yaml _site/previous-index.yaml
            helm repo index _site --url "$REPO_URL" --merge _site/previous-index.yaml
            rm _site/previous-index.yaml
          else
            helm repo index _site --url "$REPO_URL"
          fi

      - name: Verify signed Helm packages
        shell: bash
        run: |
          set -euo pipefail

          for chart in charts/*; do
            if [ -d "$chart" ]; then
              metadata="$(helm show chart "$chart")"
              chart_name="$(printf '%s\n' "$metadata" | sed -n 's/^name:[[:space:]]*//p' | head -n 1)"
              chart_version="$(printf '%s\n' "$metadata" | sed -n 's/^version:[[:space:]]*//p' | head -n 1)"
              chart_name="${chart_name%\"}"
              chart_name="${chart_name#\"}"
              chart_name="${chart_name%\'}"
              chart_name="${chart_name#\'}"
              chart_version="${chart_version%\"}"
              chart_version="${chart_version#\"}"
              chart_version="${chart_version%\'}"
              chart_version="${chart_version#\'}"

              helm verify "_site/${chart_name}-${chart_version}.tgz" --keyring "$HELM_SIGNING_PUBLIC_KEYRING"
            fi
          done

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push OCI charts
        shell: bash
        run: |
          set -euo pipefail

          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REPOSITORY="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          OCI_REPOSITORY="oci://ghcr.io/${OWNER}/${REPOSITORY}"

          shopt -s nullglob
          packages=(_site/*.tgz)

          for package in "${packages[@]}"; do
            metadata="$(helm show chart "$package")"
            chart_name="$(printf '%s\n' "$metadata" | sed -n 's/^name:[[:space:]]*//p' | head -n 1)"
            chart_version="$(printf '%s\n' "$metadata" | sed -n 's/^version:[[:space:]]*//p' | head -n 1)"
            chart_name="${chart_name%\"}"
            chart_name="${chart_name#\"}"
            chart_name="${chart_name%\'}"
            chart_name="${chart_name#\'}"
            chart_version="${chart_version%\"}"
            chart_version="${chart_version#\"}"
            chart_version="${chart_version%\'}"
            chart_version="${chart_version#\'}"

            if [ -z "$chart_name" ] || [ -z "$chart_version" ]; then
              echo "Could not determine chart metadata for ${package}; skipping."
              continue
            fi

            if helm show chart "${OCI_REPOSITORY}/${chart_name}" --version "$chart_version" >/dev/null 2>&1; then
              echo "OCI chart ${chart_name}:${chart_version} already exists; skipping."
              continue
            fi

            helm push "$package" "$OCI_REPOSITORY"
          done

      - name: Create GitHub releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');

            const repoUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            const ociRepo = `oci://ghcr.io/${context.repo.owner.toLowerCase()}/${context.repo.repo.toLowerCase()}`;
            const chartsDir = 'charts';
            const chartDirs = fs.readdirSync(chartsDir, { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => path.join(chartsDir, entry.name));

            function getMetadataValue(metadata, key) {
              const prefix = `${key}:`;
              const line = metadata.split(/\r?\n/).find((item) => item.startsWith(prefix));
              return line ? line.slice(prefix.length).trim().replace(/^["']|["']$/g, '') : '';
            }

            async function uploadAssetIfMissing(releaseId, filePath, contentType) {
              const assetName = path.basename(filePath);
              const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
              });

              if (assets.some((asset) => asset.name === assetName)) {
                core.info(`Release asset ${assetName} already exists; skipping.`);
                return;
              }

              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: assetName,
                data,
                headers: {
                  'content-type': contentType,
                  'content-length': data.length,
                },
              });
            }

            for (const chart of chartDirs) {
              const metadata = execFileSync('helm', ['show', 'chart', chart], { encoding: 'utf8' });
              const chartName = getMetadataValue(metadata, 'name');
              const chartVersion = getMetadataValue(metadata, 'version');
              const appVersion = getMetadataValue(metadata, 'appVersion');
              const description = getMetadataValue(metadata, 'description');
              const tag = `${chartName}-${chartVersion}`;
              const packagePath = path.join('_site', `${chartName}-${chartVersion}.tgz`);
              const provenancePath = `${packagePath}.prov`;

              if (!fs.existsSync(packagePath)) {
                core.info(`Package ${packagePath} was not found; skipping release ${tag}.`);
                continue;
              }

              let release;
              try {
                release = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                core.info(`Release ${tag} already exists; checking assets.`);
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              const notes = [
                `## ${chartName} ${chartVersion}`,
                '',
                description,
                '',
                '### Versions',
                '',
                `- Chart version: \`${chartVersion}\``,
                `- App version: \`${appVersion}\``,
                '',
                '### Install',
                '',
                '```bash',
                `helm repo add harish2k01 ${repoUrl}`,
                'helm repo update',
                `helm install ${chartName} harish2k01/${chartName} --version ${chartVersion}`,
                '```',
                '',
                '### Install from OCI',
                '',
                '```bash',
                `helm install ${chartName} ${ociRepo}/${chartName} --version ${chartVersion}`,
                '```',
                '',
                '### Upgrade',
                '',
                '```bash',
                `helm upgrade ${chartName} harish2k01/${chartName} --version ${chartVersion}`,
                '```',
                '',
                '### Links',
                '',
                `- Helm repository: ${repoUrl}`,
                `- OCI chart: \`${ociRepo}/${chartName}:${chartVersion}\``,
                `- Chart source: https://github.com/${context.repo.owner}/${context.repo.repo}/tree/main/${chart}`,
                `- Package: ${repoUrl}/${chartName}-${chartVersion}.tgz`,
                '',
              ].join('\n');

              if (!release) {
                release = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: `${chartName} ${chartVersion}`,
                  body: notes,
                });
              }

              await uploadAssetIfMissing(release.data.id, packagePath, 'application/gzip');

              if (fs.existsSync(provenancePath)) {
                await uploadAssetIfMissing(release.data.id, provenancePath, 'application/pgp-signature');
              } else {
                core.warning(`Provenance file ${provenancePath} was not found; release ${tag} will not have a signature asset.`);
              }
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
