name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - charts/**
      - docs/**
      - .github/workflows/release.yaml

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: helm-charts-runner
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build Helm repository
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          mkdir -p _site
          cp -R docs/. _site/
          touch _site/.nojekyll

          if curl -fsSL "$REPO_URL/index.yaml" -o _site/index.yaml; then
            grep -Eo 'https?://[^[:space:]]+\.tgz' _site/index.yaml | sort -u | while read -r package_url; do
              package_name="$(basename "$package_url")"
              if [ ! -f "_site/$package_name" ]; then
                curl -fsSL "$package_url" -o "_site/$package_name"
              fi
            done
          fi

          for chart in charts/*; do
            if [ -d "$chart" ]; then
              helm dependency update "$chart"
              helm package "$chart" --destination _site
            fi
          done

          if [ -f _site/index.yaml ]; then
            cp _site/index.yaml _site/previous-index.yaml
            helm repo index _site --url "$REPO_URL" --merge _site/previous-index.yaml
            rm _site/previous-index.yaml
          else
            helm repo index _site --url "$REPO_URL"
          fi

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push OCI charts
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REPOSITORY="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          OCI_REPOSITORY="oci://ghcr.io/${OWNER}/${REPOSITORY}"

          shopt -s nullglob
          packages=(_site/*.tgz)

          for package in "${packages[@]}"; do
            metadata="$(helm show chart "$package")"
            chart_name="$(printf '%s\n' "$metadata" | sed -n 's/^name:[[:space:]]*//p' | head -n 1)"
            chart_version="$(printf '%s\n' "$metadata" | sed -n 's/^version:[[:space:]]*//p' | head -n 1)"
            chart_name="${chart_name%\"}"
            chart_name="${chart_name#\"}"
            chart_name="${chart_name%\'}"
            chart_name="${chart_name#\'}"
            chart_version="${chart_version%\"}"
            chart_version="${chart_version#\"}"
            chart_version="${chart_version%\'}"
            chart_version="${chart_version#\'}"

            if [ -z "$chart_name" ] || [ -z "$chart_version" ]; then
              echo "Could not determine chart metadata for ${package}; skipping."
              continue
            fi

            if helm show chart "${OCI_REPOSITORY}/${chart_name}" --version "$chart_version" >/dev/null 2>&1; then
              echo "OCI chart ${chart_name}:${chart_version} already exists; skipping."
              continue
            fi

            helm push "$package" "$OCI_REPOSITORY"
          done

      - name: Create GitHub releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');

            const repoUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            const ociRepo = `oci://ghcr.io/${context.repo.owner.toLowerCase()}/${context.repo.repo.toLowerCase()}`;
            const chartsDir = 'charts';
            const chartDirs = fs.readdirSync(chartsDir, { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => path.join(chartsDir, entry.name));

            function getMetadataValue(metadata, key) {
              const prefix = `${key}:`;
              const line = metadata.split(/\r?\n/).find((item) => item.startsWith(prefix));
              return line ? line.slice(prefix.length).trim().replace(/^["']|["']$/g, '') : '';
            }

            for (const chart of chartDirs) {
              const metadata = execFileSync('helm', ['show', 'chart', chart], { encoding: 'utf8' });
              const chartName = getMetadataValue(metadata, 'name');
              const chartVersion = getMetadataValue(metadata, 'version');
              const appVersion = getMetadataValue(metadata, 'appVersion');
              const description = getMetadataValue(metadata, 'description');
              const tag = `${chartName}-${chartVersion}`;
              const packagePath = path.join('_site', `${chartName}-${chartVersion}.tgz`);

              if (!fs.existsSync(packagePath)) {
                core.info(`Package ${packagePath} was not found; skipping release ${tag}.`);
                continue;
              }

              try {
                await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                core.info(`Release ${tag} already exists; skipping.`);
                continue;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              const notes = [
                `## ${chartName} ${chartVersion}`,
                '',
                description,
                '',
                '### Versions',
                '',
                `- Chart version: \`${chartVersion}\``,
                `- App version: \`${appVersion}\``,
                '',
                '### Install',
                '',
                '```bash',
                `helm repo add harish2k01 ${repoUrl}`,
                'helm repo update',
                `helm install ${chartName} harish2k01/${chartName} --version ${chartVersion}`,
                '```',
                '',
                '### Install from OCI',
                '',
                '```bash',
                `helm install ${chartName} ${ociRepo}/${chartName} --version ${chartVersion}`,
                '```',
                '',
                '### Upgrade',
                '',
                '```bash',
                `helm upgrade ${chartName} harish2k01/${chartName} --version ${chartVersion}`,
                '```',
                '',
                '### Links',
                '',
                `- Helm repository: ${repoUrl}`,
                `- OCI chart: \`${ociRepo}/${chartName}:${chartVersion}\``,
                `- Chart source: https://github.com/${context.repo.owner}/${context.repo.repo}/tree/main/${chart}`,
                `- Package: ${repoUrl}/${chartName}-${chartVersion}.tgz`,
                '',
              ].join('\n');

              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `${chartName} ${chartVersion}`,
                body: notes,
              });

              const packageData = fs.readFileSync(packagePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: path.basename(packagePath),
                data: packageData,
                headers: {
                  'content-type': 'application/gzip',
                  'content-length': packageData.length,
                },
              });
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
