name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - charts/**
      - docs/**
      - .github/workflows/release.yaml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build Helm repository
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          mkdir -p _site
          cp -R docs/. _site/
          touch _site/.nojekyll

          if curl -fsSL "$REPO_URL/index.yaml" -o _site/index.yaml; then
            grep -Eo 'https?://[^[:space:]]+\.tgz' _site/index.yaml | sort -u | while read -r package_url; do
              package_name="$(basename "$package_url")"
              if [ ! -f "_site/$package_name" ]; then
                curl -fsSL "$package_url" -o "_site/$package_name"
              fi
            done
          fi

          for chart in charts/*; do
            if [ -d "$chart" ]; then
              helm dependency update "$chart"
              helm package "$chart" --destination _site
            fi
          done

          if [ -f _site/index.yaml ]; then
            cp _site/index.yaml _site/previous-index.yaml
            helm repo index _site --url "$REPO_URL" --merge _site/previous-index.yaml
            rm _site/previous-index.yaml
          else
            helm repo index _site --url "$REPO_URL"
          fi

      - name: Create GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          for chart in charts/*; do
            if [ ! -d "$chart" ]; then
              continue
            fi

            chart_metadata="$(helm show chart "$chart")"
            chart_name="$(printf '%s\n' "$chart_metadata" | awk -F': ' '$1 == "name" { print $2; exit }')"
            chart_version="$(printf '%s\n' "$chart_metadata" | awk -F': ' '$1 == "version" { print $2; exit }')"
            app_version="$(printf '%s\n' "$chart_metadata" | awk -F': ' '$1 == "appVersion" { print $2; exit }' | tr -d '"')"
            description="$(printf '%s\n' "$chart_metadata" | awk -F': ' '$1 == "description" { print $2; exit }')"
            tag="${chart_name}-${chart_version}"
            package="_site/${chart_name}-${chart_version}.tgz"
            notes_file="$(mktemp)"

            if [ ! -f "$package" ]; then
              echo "Package $package was not found; skipping release $tag."
              continue
            fi

            if gh release view "$tag" > /dev/null 2>&1; then
              echo "Release $tag already exists; skipping."
              continue
            fi

            cat > "$notes_file" <<EOF
## ${chart_name} ${chart_version}

${description}

### Versions

- Chart version: \`${chart_version}\`
- App version: \`${app_version}\`

### Install

\`\`\`bash
helm repo add harish2k01 ${REPO_URL}
helm repo update
helm install ${chart_name} harish2k01/${chart_name} --version ${chart_version}
\`\`\`

### Upgrade

\`\`\`bash
helm upgrade ${chart_name} harish2k01/${chart_name} --version ${chart_version}
\`\`\`

### Links

- Helm repository: ${REPO_URL}
- Chart source: https://github.com/${{ github.repository }}/tree/main/${chart}
- Package: ${REPO_URL}/${chart_name}-${chart_version}.tgz
EOF

            gh release create "$tag" "$package" \
              --title "${chart_name} ${chart_version}" \
              --notes-file "$notes_file"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
